<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Signal Report · Intelligence Archive</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #f1f5f9;
  color: #0f172a;
}

/* ── App shell ── */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Main content: sidebar + viewer ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ── Left sidebar ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: #ffffff;
  border-right: 1px solid #e2e8f0;
  overflow: hidden;
}

/* ── Sidebar brand header ── */
.sidebar-header {
  flex-shrink: 0;
  background: #ffffff;
  padding: 14px 14px 10px;
  border-bottom: 1px solid #e2e8f0;
}

.sidebar-header-eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #94a3b8;
  margin-bottom: 3px;
}

.sidebar-header-title {
  font-size: 15px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -.02em;
  line-height: 1;
  margin-bottom: 10px;
}

.sidebar-header-title span { color: #38bdf8; }

.sidebar-meta {
  font-size: 11px;
  color: #94a3b8;
  display: flex;
  align-items: center;
  gap: 6px;
}

.sidebar-meta-val {
  color: #475569;
  font-weight: 600;
}

.sidebar-meta-dot {
  color: #cbd5e1;
  font-size: 8px;
}

.sidebar-controls {
  flex-shrink: 0;
  padding: 12px 14px;
  border-bottom: 1px solid #e2e8f0;
  background: #f8fafc;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-wrap {
  flex: 1;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  pointer-events: none;
}

#search {
  width: 100%;
  border: 1px solid #e2e8f0;
  border-radius: 5px;
  padding: 6px 8px 6px 28px;
  font-size: 12px;
  font-family: inherit;
  color: #0f172a;
  background: #fff;
  outline: none;
  transition: border-color .15s;
}

#search::placeholder { color: #94a3b8; }
#search:focus { border-color: #38bdf8; }

.sort-toggle {
  flex-shrink: 0;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 5px;
  padding: 6px 9px;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  color: #64748b;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.sort-toggle:hover {
  border-color: #38bdf8;
  color: #0369a1;
}

/* ── Section head inside sidebar ── */
.sidebar-section-head {
  flex-shrink: 0;
  padding: 7px 14px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.section-head-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: #94a3b8;
}

#result-count {
  font-size: 10px;
  font-weight: 600;
  color: #38bdf8;
}

/* ── Scrollable list ── */
#report-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px;
  scrollbar-width: thin;
  scrollbar-color: #e2e8f0 transparent;
}

#report-list::-webkit-scrollbar { width: 4px; }
#report-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

/* ── Report row item ── */
.report-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background .15s, border-color .15s;
  margin-bottom: 4px;
  user-select: none;
}

.report-item:hover {
  background: #f1f5f9;
  border-color: #e2e8f0;
}

.report-item.active {
  background: #eff6ff;
  border-color: #93c5fd;
}

.item-date-block {
  flex-shrink: 0;
  text-align: center;
  width: 36px;
}

.item-day {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1;
  letter-spacing: -.02em;
}

.item-mon {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: #38bdf8;
  margin-top: 1px;
}

.item-year {
  font-size: 9px;
  color: #94a3b8;
}

.item-sep {
  width: 1px;
  height: 32px;
  background: #e2e8f0;
  flex-shrink: 0;
}

.report-item.active .item-sep {
  background: #bfdbfe;
}

.item-info {
  flex: 1;
  min-width: 0;
}

.item-title {
  font-size: 12px;
  font-weight: 600;
  color: #0f172a;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-sub {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 2px;
}

.item-arrow {
  font-size: 14px;
  color: #cbd5e1;
  flex-shrink: 0;
  transition: color .15s, transform .15s;
}

.report-item.active .item-arrow,
.report-item:hover .item-arrow {
  color: #38bdf8;
  transform: translateX(2px);
}

/* ── Loading / empty states ── */
#loading-state, #empty-state {
  padding: 32px 14px;
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
}

#empty-state { display: none; }

.spinner {
  display: inline-block;
  width: 13px;
  height: 13px;
  border: 2px solid #e2e8f0;
  border-top-color: #38bdf8;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 5px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Right viewer panel ── */
.viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #f1f5f9;
}

/* viewer toolbar */
.viewer-toolbar {
  flex-shrink: 0;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 40px;
}

.viewer-breadcrumb {
  font-size: 12px;
  color: #64748b;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.viewer-breadcrumb strong {
  color: #0f172a;
  font-weight: 600;
}

.viewer-open-btn {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  color: #2563eb;
  background: #eff6ff;
  border: 1px solid #93c5fd;
  border-radius: 5px;
  padding: 4px 10px;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s;
  white-space: nowrap;
}

.viewer-open-btn:hover { background: #dbeafe; }

/* iframe */
#viewer-frame {
  flex: 1;
  width: 100%;
  border: none;
  display: block;
}

/* placeholder when nothing selected */
.viewer-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  gap: 10px;
  background: #f8fafc;
}

.viewer-placeholder-icon {
  font-size: 36px;
  opacity: .4;
}

.viewer-placeholder p {
  font-size: 13px;
}

/* ── Hamburger button (mobile only) ── */
.hamburger {
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  width: 34px;
  height: 34px;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 7px;
  cursor: pointer;
  flex-direction: column;
  gap: 4px;
  transition: background .15s;
}

.hamburger:hover { background: #e2e8f0; }

.hamburger span {
  display: block;
  width: 15px;
  height: 2px;
  background: #475569;
  border-radius: 2px;
  transition: all .2s;
}

.hamburger.sidebar-open-active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger.sidebar-open-active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.sidebar-open-active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

/* ── Sidebar overlay (mobile) ── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.3);
  z-index: 99;
}

.sidebar-overlay.visible { display: block; }

/* ── Responsive: push-drawer on mobile ── */
@media (max-width: 700px) {
  .main {
    overflow: hidden;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }

  /* Sidebar: fixed, completely off-screen by default */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: min(280px, 80vw);
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow: none;
  }

  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 20px rgba(0,0,0,.14);
  }

  /* Push viewer when sidebar opens */
  .sidebar.open + .main {
    transform: translateX(min(280px, 80vw));
  }

  .hamburger { display: flex; }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app">

  <!-- ── Main ── -->
  <div class="main">

    <!-- Left sidebar -->
    <div class="sidebar" id="sidebar">

      <!-- Brand header -->
      <div class="sidebar-header">
        <div class="sidebar-header-eyebrow">Daily Archive</div>
        <div class="sidebar-header-title">The <span>Signal</span> Report</div>
        <div class="sidebar-meta">
          <span class="sidebar-meta-val" id="stat-total">—</span> reports
          <span class="sidebar-meta-dot">●</span>
          <span class="sidebar-meta-val" id="stat-articles">—</span> articles
          <span class="sidebar-meta-dot">●</span>
          <span class="sidebar-meta-val" id="stat-latest">—</span>
        </div>
      </div>

      <!-- Search + sort -->
      <div class="sidebar-controls">
        <div class="search-wrap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search" placeholder="날짜 검색…" autocomplete="off">
        </div>
        <button class="sort-toggle" id="sort-btn" title="정렬 전환">↓ 최신</button>
      </div>

      <!-- Section head -->
      <div class="sidebar-section-head">
        <span class="section-head-label">Reports</span>
        <span id="result-count"></span>
      </div>

      <!-- List -->
      <div id="report-list">
        <div id="loading-state"><span class="spinner"></span>불러오는 중…</div>
        <div id="empty-state">검색 결과 없음</div>
      </div>

    </div><!-- /sidebar -->

    <!-- Right viewer -->
    <div class="viewer">

      <div class="viewer-toolbar" id="viewer-toolbar">
        <button class="hamburger" id="hamburger" aria-label="메뉴">
          <span></span><span></span><span></span>
        </button>
        <span class="viewer-breadcrumb" id="viewer-breadcrumb">
          ← 왼쪽 목록에서 리포트를 선택하세요
        </span>
        <a href="#" class="viewer-open-btn" id="open-btn"
           target="_blank" rel="noopener"
           style="display:none;">↗ 새 탭으로 열기</a>
      </div>

      <div class="viewer-placeholder" id="viewer-placeholder">
        <div class="viewer-placeholder-icon">◈</div>
        <p>리포트를 선택하면 여기에 표시됩니다</p>
      </div>

      <iframe id="viewer-frame" title="Report Viewer"
              style="display:none;"></iframe>

    </div><!-- /viewer -->

  </div><!-- /main -->
</div><!-- /app -->

<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun',
                  'Jul','Aug','Sep','Oct','Nov','Dec'];

  let allReports   = [];
  let sortAsc      = false;
  let activeItem   = null;

  /* ── Date parser ── */
  function parseDate(dateStr) {
    const m = (dateStr || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return null;
    return { year: m[1], month: m[2], day: m[3],
             monthName: MONTHS[parseInt(m[2]) - 1] };
  }

  /* ── Build sidebar item ── */
  function buildItem(r) {
    const d    = parseDate(r.generated || r.date);
    const day  = d ? d.day  : '??';
    const mon  = d ? d.monthName : '';
    const year = d ? d.year : '';

    const div = document.createElement('div');
    div.className = 'report-item';
    div.dataset.filename = r.filename;

    div.innerHTML = `
      <div class="item-date-block">
        <div class="item-day">${day}</div>
        <div class="item-mon">${mon}</div>
        <div class="item-year">${year}</div>
      </div>
      <div class="item-sep"></div>
      <div class="item-info">
        <div class="item-title">${r.date || r.filename}</div>
        <div class="item-sub">${r.articles ?? '?'} articles</div>
      </div>
      <div class="item-arrow">›</div>
    `;

    div.addEventListener('click', () => selectReport(r, div));
    return div;
  }

  /* ── Select & load report ── */
  function selectReport(r, itemEl) {
    // Deactivate previous
    if (activeItem) activeItem.classList.remove('active');
    activeItem = itemEl;
    itemEl.classList.add('active');

    // Mobile: close drawer when report selected
    closeSidebar();

    const href = `dashboard/${r.filename}`;

    // Update breadcrumb
    document.getElementById('viewer-breadcrumb').innerHTML =
      `<strong>The Signal Report</strong> &rsaquo; ${r.date || r.filename}`;

    // Open-in-new-tab button
    const btn = document.getElementById('open-btn');
    btn.href = href;
    btn.style.display = 'inline-block';

    // Show iframe
    const frame = document.getElementById('viewer-frame');
    const placeholder = document.getElementById('viewer-placeholder');

    placeholder.style.display = 'none';
    frame.style.display = 'block';
    frame.src = href;
  }

  /* ── Render list ── */
  function render(query) {
    const list  = document.getElementById('report-list');
    const empty = document.getElementById('empty-state');

    // Remove all items (keep loading/empty nodes)
    [...list.querySelectorAll('.report-item')].forEach(el => el.remove());

    let reports = allReports.filter(r =>
      !query || (r.date || r.filename).includes(query.trim())
    );
    if (!sortAsc) reports = [...reports].reverse();

    document.getElementById('result-count').textContent =
      `${reports.length}`;

    empty.style.display = reports.length === 0 ? 'block' : 'none';

    reports.forEach(r => list.appendChild(buildItem(r)));
  }

  /* ── Stats ── */
  function updateStats() {
    document.getElementById('stat-total').textContent = allReports.length;
    const total = allReports.reduce((s, r) => s + (r.articles || 0), 0);
    document.getElementById('stat-articles').textContent = total || '—';

    const sorted = [...allReports].sort((a, b) =>
      (a.date || '').localeCompare(b.date || ''));
    const latest = sorted[sorted.length - 1];
    if (latest) {
      const d = parseDate(latest.date);
      document.getElementById('stat-latest').textContent =
        latest.date ? latest.date.slice(2) : '—';
    }
  }

  /* ── Load manifest ── */
  async function loadManifest() {
    const loading = document.getElementById('loading-state');
    try {
      const res = await fetch('dashboard/manifest.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allReports = (data.reports || []).sort((a, b) =>
        (a.date || '').localeCompare(b.date || ''));
    } catch (err) {
      console.warn('manifest.json load failed:', err);
      allReports = [];
    }

    loading.style.display = 'none';
    updateStats();
    render('');

    // Auto-select the latest report (items[0] is always the latest in default desc order)
    const items = document.querySelectorAll('.report-item');
    if (allReports.length > 0 && items[0]) {
      items[0].click();
    }
  }

  /* ── Mobile drawer ── */
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const hamburger = document.getElementById('hamburger');

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
    hamburger.classList.add('sidebar-open-active');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
    hamburger.classList.remove('sidebar-open-active');
  }

  hamburger.addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
  );
  overlay.addEventListener('click', closeSidebar);

  /* ── Sort toggle ── */
  document.getElementById('sort-btn').addEventListener('click', function() {
    sortAsc = !sortAsc;
    this.textContent = sortAsc ? '↑ 오래된' : '↓ 최신';
    render(document.getElementById('search').value);
  });

  /* ── Search ── */
  document.getElementById('search').addEventListener('input', e => {
    render(e.target.value);
  });

  loadManifest();
</script>
</body>
</html>
